version: "3.9"

# Production compose for Alibaba Cloud ECS + RDS
# Usage:
#   cp deploy/alicloud/.env.alicloud.example .env.prod
#   # Fill in all values in .env.prod
#   docker-compose -f deploy/alicloud/docker-compose.prod.yml --env-file .env.prod up -d

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${RDS_PASSWORD}
      MYSQL_DATABASE: ${RDS_DB}
      MYSQL_USER: ${RDS_USER}
      MYSQL_PASSWORD: ${RDS_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # mount SSL certs if using certbot
    depends_on:
      - server

  server:
    depends_on:
      - db
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/${ACR_REPO}:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: always
    environment:
      # ── Database (Alibaba RDS endpoint) ──────────────────────────────────
      DATABASE_URL: mysql+pymysql://${RDS_USER}:${RDS_PASSWORD}@${RDS_HOST}:${RDS_PORT:-3306}/${RDS_DB}

      # ── Server bind ───────────────────────────────────────────────────────
      TCP_HOST: "0.0.0.0"
      TCP_PORT: "8808"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8000"

      # ── Tuning ────────────────────────────────────────────────────────────
      IDLE_TIMEOUT_SECS: "${IDLE_TIMEOUT_SECS:-120}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

      # ── Auth ──────────────────────────────────────────────────────────────
      SECRET_KEY: "${SECRET_KEY}"
      TOKEN_EXPIRE_HOURS: "${TOKEN_EXPIRE_HOURS:-8}"
    ports:
      - "8808:8808"   # TCP — vehicle terminal connections (expose via SLB TCP listener)
    # Port 8000 is NOT published externally; Nginx proxies to it internally
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  mysql_data:
