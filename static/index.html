<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Selvehicle Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    height: 52px;
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    background: #1e3a5f;
    color: #60a5fa;
  }
  .badge.online { background: #14532d; color: #4ade80; }
  .badge.error  { background: #450a0a; color: #f87171; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }
  .spacer { flex: 1; }
  #last-update { font-size: 11px; color: #64748b; }
  #refresh-btn {
    background: #2d3148; border: none; color: #94a3b8;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #refresh-btn:hover { background: #3b4166; color: #e2e8f0; }
  #logout-btn {
    background: transparent; border: 1px solid #3b4166; color: #94a3b8;
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #logout-btn:hover { border-color: #f87171; color: #f87171; }
  #username-display { font-size: 12px; color: #64748b; }

  /* ── Login overlay ── */
  #login-overlay {
    position: fixed; inset: 0;
    background: #0f1117;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 36px 40px;
    width: 360px;
  }
  .login-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .login-box p  { font-size: 13px; color: #64748b; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
  .form-group input {
    width: 100%; background: #0f1117;
    border: 1px solid #2d3148; border-radius: 8px;
    color: #e2e8f0; font-size: 14px; padding: 9px 12px;
    outline: none; transition: border-color .15s;
  }
  .form-group input:focus { border-color: #3b82f6; }
  #login-btn {
    width: 100%; background: #3b82f6; color: #fff;
    border: none; border-radius: 8px; padding: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    margin-top: 4px; transition: background .15s;
  }
  #login-btn:hover { background: #2563eb; }
  #login-error {
    color: #f87171; font-size: 12px; margin-top: 10px;
    min-height: 18px; text-align: center;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 280px;
    flex-shrink: 0;
    background: #1a1d27;
    border-right: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #64748b;
    border-bottom: 1px solid #2d3148;
  }
  #terminal-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #terminal-list::-webkit-scrollbar { width: 4px; }
  #terminal-list::-webkit-scrollbar-track { background: transparent; }
  #terminal-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

  .terminal-card {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background .15s, border-color .15s;
  }
  .terminal-card:hover { background: #20243a; }
  .terminal-card.active {
    background: #1e3a5f;
    border-color: #3b82f6;
  }
  .tc-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .tc-phone { font-size: 13px; font-weight: 600; }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ef4444;
  }
  .status-dot.online { background: #4ade80; animation: pulse 2s infinite; }
  .tc-meta { font-size: 11px; color: #64748b; }
  .tc-plate {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    background: #1e3a5f;
    color: #93c5fd;
    padding: 1px 6px;
    border-radius: 4px;
    margin-top: 4px;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    min-height: 0;
  }

  /* ── Bottom panel ── */
  .bottom-panel {
    height: 220px;
    flex-shrink: 0;
    background: #1a1d27;
    border-top: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid #2d3148;
    flex-shrink: 0;
  }
  .tab {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    color: #64748b;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
  .panel-body {
    flex: 1;
    overflow: auto;
  }
  .panel-body::-webkit-scrollbar { width: 4px; height: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

  /* ── Table ── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  thead th {
    position: sticky; top: 0;
    background: #1e2235;
    padding: 6px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #64748b;
    border-bottom: 1px solid #2d3148;
  }
  tbody tr { border-bottom: 1px solid #1e2235; }
  tbody tr:hover { background: #20243a; }
  td {
    padding: 5px 12px;
    color: #cbd5e1;
    white-space: nowrap;
  }
  td.dim { color: #475569; }
  .alarm { color: #f87171; font-weight: 600; }
  .empty { padding: 24px; text-align: center; color: #475569; font-size: 13px; }

  /* ── Info panel (right sidebar) ── */
  .info-panel {
    width: 240px;
    flex-shrink: 0;
    background: #1a1d27;
    border-left: 1px solid #2d3148;
    overflow-y: auto;
    padding: 12px;
  }
  .info-panel::-webkit-scrollbar { width: 4px; }
  .info-panel::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }
  .info-section { margin-bottom: 16px; }
  .info-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #475569;
    margin-bottom: 8px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    border-bottom: 1px solid #1e2235;
  }
  .info-row span:first-child { color: #64748b; }
  .info-row span:last-child { color: #e2e8f0; font-weight: 500; }
  .no-selection {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #475569;
    font-size: 12px;
    text-align: center;
    padding: 16px;
  }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>Selvehicle</h2>
    <p>Sign in to continue</p>
    <div class="form-group">
      <label>Username</label>
      <input id="login-user" type="text" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button id="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<header>
  <span class="dot"></span>
  <h1>Selvehicle</h1>
  <span class="badge" id="online-count">0 online</span>
  <span class="badge" id="total-count">0 terminals</span>
  <div class="spacer"></div>
  <span id="username-display"></span>
  <span id="last-update"></span>
  <button id="refresh-btn" onclick="refresh()">↻ Refresh</button>
  <button id="logout-btn" onclick="logout()">Sign out</button>
</header>

<div class="main">
  <aside>
    <div class="sidebar-header">Terminals</div>
    <div id="terminal-list"><div class="empty">Loading…</div></div>
  </aside>

  <div class="content">
    <div id="map"></div>
    <div class="bottom-panel">
      <div class="panel-tabs">
        <div class="tab active" onclick="showTab('locations')">Location History</div>
        <div class="tab" onclick="showTab('commands')">Commands</div>
      </div>
      <div class="panel-body">
        <div id="tab-locations">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Speed</th>
                <th>Direction</th>
                <th>Ignition</th>
                <th>Satellites</th>
                <th>Signal</th>
                <th>Alarm</th>
              </tr>
            </thead>
            <tbody id="loc-tbody"><tr><td colspan="9" class="empty">Select a terminal</td></tr></tbody>
          </table>
        </div>
        <div id="tab-commands" style="display:none">
          <table>
            <thead>
              <tr>
                <th>Sent At</th>
                <th>Command</th>
                <th>Serial</th>
                <th>ACKed</th>
                <th>Result</th>
                <th>ACK At</th>
              </tr>
            </thead>
            <tbody id="cmd-tbody"><tr><td colspan="6" class="empty">Select a terminal</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="info-panel" id="info-panel">
    <div class="no-selection">Select a terminal<br>to see details</div>
  </div>
</div>

<script>
const API = '';   // same origin
let map, markers = {}, polylines = {}, selectedPhone = null, terminals = [];
let _token = localStorage.getItem('selvehicle_token') || '';

// ── Auth ──────────────────────────────────────────────────────────────────────
function authHeaders() {
  return _token ? { 'Authorization': 'Bearer ' + _token } : {};
}

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  document.getElementById('login-btn').textContent = 'Signing in…';

  const form = new URLSearchParams({ username: user, password: pass });
  try {
    const r = await fetch(API + '/auth/login', { method: 'POST', body: form });
    if (!r.ok) { errEl.textContent = 'Invalid username or password'; return; }
    const data = await r.json();
    _token = data.access_token;
    localStorage.setItem('selvehicle_token', _token);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('username-display').textContent = user + ' ·';
    refresh();
  } catch {
    errEl.textContent = 'Could not reach server';
  } finally {
    document.getElementById('login-btn').textContent = 'Sign In';
  }
}

function logout() {
  _token = '';
  localStorage.removeItem('selvehicle_token');
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
}

// Allow Enter key on login form
document.addEventListener('DOMContentLoaded', () => {
  ['login-user','login-pass'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );
});

// ── Map init ──────────────────────────────────────────────────────────────────
map = L.map('map', { zoomControl: true }).setView([20, 100], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

const iconOnline = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#4ade80;border:2px solid #fff;box-shadow:0 0 6px #4ade80"></div>',
  iconSize: [14, 14], iconAnchor: [7, 7],
});
const iconOffline = L.divIcon({
  className: '',
  html: '<div style="width:12px;height:12px;border-radius:50%;background:#ef4444;border:2px solid #fff;opacity:.7"></div>',
  iconSize: [12, 12], iconAnchor: [6, 6],
});
const iconSelected = L.divIcon({
  className: '',
  html: '<div style="width:18px;height:18px;border-radius:50%;background:#60a5fa;border:3px solid #fff;box-shadow:0 0 10px #60a5fa"></div>',
  iconSize: [18, 18], iconAnchor: [9, 9],
});

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function get(path) {
  const r = await fetch(API + path, { headers: authHeaders() });
  if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Main refresh ─────────────────────────────────────────────────────────────
async function refresh() {
  try {
    terminals = await get('/terminals');
    const onlineSet = new Set((await get('/terminals/online')).online);

    document.getElementById('total-count').textContent = `${terminals.length} terminals`;
    document.getElementById('online-count').textContent = `${onlineSet.size} online`;
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();

    renderSidebar(terminals, onlineSet);
    await updateMapMarkers(terminals);

    if (selectedPhone) {
      await loadTerminalDetails(selectedPhone);
    }
  } catch(e) {
    console.error(e);
    document.getElementById('online-count').className = 'badge error';
    document.getElementById('online-count').textContent = 'API error';
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(list, onlineSet) {
  const el = document.getElementById('terminal-list');
  if (!list.length) { el.innerHTML = '<div class="empty">No terminals registered</div>'; return; }
  el.innerHTML = list.map(t => {
    const isOnline = onlineSet.has(t.phone);
    const active = t.phone === selectedPhone ? ' active' : '';
    return `
      <div class="terminal-card${active}" onclick="selectTerminal('${t.phone}')">
        <div class="tc-top">
          <span class="tc-phone">${t.phone}</span>
          <span class="status-dot ${isOnline ? 'online' : ''}"></span>
        </div>
        <div class="tc-meta">${t.device_model || '—'} · ${isOnline ? 'Online' : 'Offline'}</div>
        ${t.plate_no ? `<span class="tc-plate">${t.plate_no}</span>` : ''}
      </div>`;
  }).join('');
}

// ── Map markers ───────────────────────────────────────────────────────────────
async function updateMapMarkers(list) {
  const bounds = [];
  for (const t of list) {
    let loc = null;
    try { loc = await get(`/terminals/${t.phone}/locations/latest`); } catch {}

    if (!loc || loc.latitude == null) continue;
    const latlng = [loc.latitude, loc.longitude];
    bounds.push(latlng);

    const isSelected = t.phone === selectedPhone;
    const icon = isSelected ? iconSelected : (t.online ? iconOnline : iconOffline);
    const popup = `
      <b>${t.phone}</b><br>
      ${t.plate_no || ''} ${t.device_model || ''}<br>
      Lat: ${loc.latitude.toFixed(5)}, Lng: ${loc.longitude.toFixed(5)}<br>
      Speed: ${loc.speed ?? '—'} km/h · Dir: ${loc.direction ?? '—'}°<br>
      Ignition: ${loc.ignition_on ? '🟢 On' : '🔴 Off'}<br>
      <small>${fmtTime(loc.received_at)}</small>`;

    if (markers[t.phone]) {
      markers[t.phone].setLatLng(latlng).setIcon(icon).setPopupContent(popup);
    } else {
      markers[t.phone] = L.marker(latlng, { icon })
        .addTo(map)
        .bindPopup(popup)
        .on('click', () => selectTerminal(t.phone));
    }
  }
  if (bounds.length && !selectedPhone) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 10 });
  }
}

// ── Trail polyline for selected terminal ──────────────────────────────────────
async function drawTrail(phone) {
  // Remove old trails
  Object.values(polylines).forEach(p => map.removeLayer(p));
  polylines = {};

  try {
    const locs = await get(`/terminals/${phone}/locations?limit=50`);
    const pts = locs.filter(l => l.latitude != null).map(l => [l.latitude, l.longitude]);
    if (pts.length < 2) return;
    polylines[phone] = L.polyline(pts, {
      color: '#60a5fa', weight: 2, opacity: .6, dashArray: '4 4'
    }).addTo(map);
    map.fitBounds(polylines[phone].getBounds(), { padding: [40, 40] });
  } catch {}
}

// ── Select terminal ───────────────────────────────────────────────────────────
async function selectTerminal(phone) {
  selectedPhone = phone;
  document.querySelectorAll('.terminal-card').forEach(el => el.classList.remove('active'));
  const cards = document.querySelectorAll('.terminal-card');
  cards.forEach(el => { if (el.querySelector('.tc-phone').textContent === phone) el.classList.add('active'); });

  // Update marker icon
  Object.entries(markers).forEach(([p, m]) => {
    const t = terminals.find(x => x.phone === p);
    m.setIcon(p === phone ? iconSelected : (t?.online ? iconOnline : iconOffline));
  });

  await drawTrail(phone);
  await loadTerminalDetails(phone);
}

async function loadTerminalDetails(phone) {
  const t = terminals.find(x => x.phone === phone);
  if (!t) return;

  // Info panel
  renderInfoPanel(t);

  // Locations table
  try {
    const locs = await get(`/terminals/${phone}/locations?limit=30`);
    renderLocTable(locs);
  } catch { renderLocTable([]); }

  // Commands table
  try {
    const cmds = await get(`/terminals/${phone}/commands?limit=30`);
    renderCmdTable(cmds);
  } catch { renderCmdTable([]); }
}

// ── Info panel ────────────────────────────────────────────────────────────────
function renderInfoPanel(t) {
  document.getElementById('info-panel').innerHTML = `
    <div class="info-section">
      <div class="info-label">Terminal</div>
      <div class="info-row"><span>Phone</span><span>${t.phone}</span></div>
      <div class="info-row"><span>Plate</span><span>${t.plate_no || '—'}</span></div>
      <div class="info-row"><span>Model</span><span>${t.device_model || '—'}</span></div>
      <div class="info-row"><span>Status</span><span style="color:${t.online ? '#4ade80':'#f87171'}">${t.online ? 'Online' : 'Offline'}</span></div>
      <div class="info-row"><span>Auth</span><span style="color:${t.authenticated ? '#4ade80':'#f59e0b'}">${t.authenticated ? 'Yes' : 'No'}</span></div>
    </div>
    <div class="info-section">
      <div class="info-label">Connection</div>
      <div class="info-row"><span>IP</span><span>${t.last_ip || '—'}</span></div>
      <div class="info-row"><span>Last seen</span><span>${t.last_seen_at ? fmtTime(t.last_seen_at) : '—'}</span></div>
      <div class="info-row"><span>Registered</span><span>${t.registered_at ? fmtTime(t.registered_at) : '—'}</span></div>
    </div>`;
}

// ── Tables ────────────────────────────────────────────────────────────────────
function renderLocTable(locs) {
  const tb = document.getElementById('loc-tbody');
  if (!locs.length) { tb.innerHTML = '<tr><td colspan="9" class="empty">No location data</td></tr>'; return; }
  tb.innerHTML = locs.map(l => `
    <tr>
      <td>${fmtTime(l.received_at)}</td>
      <td>${l.latitude?.toFixed(5) ?? '—'}</td>
      <td>${l.longitude?.toFixed(5) ?? '—'}</td>
      <td>${l.speed != null ? l.speed + ' km/h' : '—'}</td>
      <td>${l.direction != null ? l.direction + '°' : '—'}</td>
      <td>${l.ignition_on ? '🟢' : '🔴'}</td>
      <td>${l.gnss_satellites ?? '—'}</td>
      <td>${l.signal_strength ?? '—'}</td>
      <td class="${l.alarm_flag ? 'alarm' : 'dim'}">${l.alarm_flag ? '⚠ ' + l.alarm_flag : '—'}</td>
    </tr>`).join('');
}

function renderCmdTable(cmds) {
  const tb = document.getElementById('cmd-tbody');
  if (!cmds.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">No commands sent</td></tr>'; return; }
  const names = { 100:'Power On', 101:'Power Off', 102:'Start Alarm', 103:'Stop Alarm' };
  tb.innerHTML = cmds.map(c => {
    const label = c.params?.command ? c.params.command : `0x${c.msg_id.toString(16).toUpperCase()}`;
    return `
      <tr>
        <td>${fmtTime(c.sent_at)}</td>
        <td>${label}</td>
        <td class="dim">${c.serial_no ?? '—'}</td>
        <td style="color:${c.acked ? '#4ade80':'#94a3b8'}">${c.acked ? 'Yes' : 'Pending'}</td>
        <td class="${c.ack_result === 0 ? '' : 'alarm'}">${c.ack_result != null ? (c.ack_result === 0 ? 'OK' : 'Err ' + c.ack_result) : '—'}</td>
        <td class="dim">${c.acked_at ? fmtTime(c.acked_at) : '—'}</td>
      </tr>`;
  }).join('');
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((el, i) => {
    const n = ['locations','commands'][i];
    el.classList.toggle('active', n === name);
  });
  document.getElementById('tab-locations').style.display = name === 'locations' ? '' : 'none';
  document.getElementById('tab-commands').style.display  = name === 'commands'  ? '' : 'none';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ── Auto-refresh every 10s ────────────────────────────────────────────────────
if (_token) {
  // Validate existing token, then start
  fetch(API + '/auth/me', { headers: authHeaders() }).then(r => {
    if (r.ok) {
      r.json().then(u => {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('username-display').textContent = u.username + ' ·';
        refresh();
      });
    } else {
      logout();
    }
  });
}
setInterval(() => { if (_token) refresh(); }, 10000);
</script>
